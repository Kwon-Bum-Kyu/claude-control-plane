name: release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Mark `-test` / `-rc` / `-beta` tags as prereleases so they do not become "Latest"
          prerelease_flag=""
          if [[ "$tag" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            $prerelease_flag \
            LICENSE
